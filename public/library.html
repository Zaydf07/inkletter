<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Newsletters · Inkletter</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F1ECE1;--panel:#fff;--panel-2:#FBF7EF;--field:#F2EDE2;--line:#E3DACA;--line-soft:#EDE6D8;--text:#211C14;--muted:#6E6557;--faint:#A89E8C;--ink:#4B43C4;--clay:#B65334;--green:#2E8E6A;--grad:linear-gradient(165deg,#5750D8,#3F37AC);--ff-d:'Newsreader',Georgia,serif;--ff-b:'Hanken Grotesk',system-ui,sans-serif;--ff-m:'JetBrains Mono',ui-monospace,monospace;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

.nav{background:rgba(241,236,225,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft);padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--ff-d);font-size:19px;font-weight:600}
.brand .mk{width:30px;height:30px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:999px;font-weight:600;font-size:13.5px;border:1.5px solid transparent;transition:.16s;font-family:inherit}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-ghost{border-color:var(--line);color:var(--text);background:var(--panel)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}

.wrap{max-width:1080px;margin:0 auto;padding:38px 28px 80px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
h1{font-family:var(--ff-d);font-size:32px;font-weight:500;letter-spacing:-.015em}
.sub{color:var(--muted);font-size:14px;margin-top:4px}

.toolbar{display:flex;align-items:center;gap:10px;margin:22px 0;flex-wrap:wrap}
.search{flex:1;min-width:220px;position:relative}
.search input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--line);border-radius:999px;background:var(--panel);font-size:13.5px;outline:none;transition:.15s;font-family:inherit}
.search input:focus{border-color:var(--ink)}
.search .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px}
.tabs{display:flex;gap:4px;background:var(--field);border-radius:999px;padding:4px}
.tab{border:none;background:none;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted)}
.tab.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 4px rgba(33,28,20,.1)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.18s;display:flex;flex-direction:column}
.card:hover{border-color:rgba(75,67,196,.35);box-shadow:0 10px 30px -12px rgba(33,28,20,.18);transform:translateY(-2px)}
.card-preview{height:150px;background:var(--panel-2);border-bottom:1px solid var(--line-soft);overflow:hidden;position:relative;cursor:pointer}
.card-preview iframe{border:none;width:200%;height:300%;transform:scale(.5);transform-origin:top left;pointer-events:none;background:#fff}
.card-preview .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;flex-direction:column;gap:6px}
.card-body{padding:14px 16px 12px;flex:1;display:flex;flex-direction:column}
.card-title{font-weight:700;font-size:14.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pill{font-family:var(--ff-m);font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase}
.pill-doc{background:rgba(75,67,196,.1);color:var(--ink)}
.pill-layout{background:rgba(46,142,106,.12);color:var(--green)}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:auto}
.act{padding:7px;border:1.5px solid var(--line);border-radius:8px;background:var(--panel);font-size:12px;font-weight:600;color:var(--muted);transition:.15s;text-align:center}
.act:hover{border-color:var(--ink);color:var(--ink)}
.act.wide{grid-column:1/-1}
.act.danger:hover{border-color:var(--clay);color:var(--clay)}

.empty-state{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--faint)}
.empty-state .em{font-size:52px;margin-bottom:14px}
.empty-state h3{font-size:18px;color:var(--muted);margin-bottom:8px}
.empty-state p{font-size:14px;margin-bottom:22px}

.stat-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--panel-2);border-radius:12px;padding:14px 20px;min-width:120px}
.stat b{display:block;font-family:var(--ff-d);font-size:26px;font-weight:600;color:var(--ink)}
.stat span{font-size:11.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-family:var(--ff-m)}

.confirm{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(33,28,20,.4);backdrop-filter:blur(4px)}
.confirm.open{display:flex}
.confirm-box{background:var(--panel);border-radius:14px;padding:26px 28px;width:min(360px,90vw)}
.confirm-box h3{font-size:16px;margin-bottom:8px}
.confirm-box p{font-size:13.5px;color:var(--muted);margin-bottom:20px;line-height:1.55}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:10px;border-radius:999px;font-weight:600;font-size:13.5px;border:1.5px solid var(--line);background:var(--panel)}
.confirm-btns .del{border:none;background:var(--clay);color:#fff}
</style>
</head>
<body>

<header class="nav">
  <a class="brand" href="/"><span class="mk">✒</span> Inkletter</a>
  <div style="display:flex;gap:10px">
    <a href="/teams" class="btn btn-ghost">👥 Team &amp; sharing</a>
    <a href="/email-editor" class="btn btn-primary">＋ New newsletter</a>
  </div>
</header>

<div class="wrap">
  <div class="page-head">
    <div>
      <h1>My Newsletters</h1>
      <div class="sub">Your saved newsletters, drafts and reusable layouts — all in one place.</div>
    </div>
    <a href="/email-editor" class="btn btn-ghost">Open editor →</a>
  </div>

  <div class="stat-row" id="statRow"></div>

  <div class="toolbar">
    <div class="search"><span class="ic">🔍</span><input type="search" id="search" placeholder="Search by name…" oninput="render()"></div>
    <div class="tabs">
      <button class="tab on" data-filter="all"    onclick="setFilter('all',this)">All</button>
      <button class="tab"    data-filter="doc"    onclick="setFilter('doc',this)">Newsletters</button>
      <button class="tab"    data-filter="layout" onclick="setFilter('layout',this)">Layouts</button>
      <button class="tab"    data-filter="archived" onclick="setFilter('archived',this)">🗄 Archived</button>
    </div>
  </div>

  <!-- project / group chips -->
  <div id="groupBar" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:-6px 0 20px"></div>

  <div class="grid" id="grid"><div class="empty-state"><div class="em">⏳</div><h3>Loading…</h3></div></div>
</div>

<div class="confirm" id="confirm">
  <div class="confirm-box">
    <h3>Delete this item?</h3>
    <p>"<span id="confirmName"></span>" will be permanently removed. This can't be undone.</p>
    <div class="confirm-btns">
      <button onclick="closeConfirm()">Cancel</button>
      <button class="del" id="confirmDel">Delete</button>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/docstore.js"></script>
<script>
const LAYOUT_KEY = 'StreamInk_EmailTemplates';
const META_KEY   = 'Inkletter_ItemMeta';   // { "doc:id": {group, archived} }
let ITEMS = [];        // combined docs + layouts
let FILTER = 'all';
let GROUP  = 'all';    // active project/group filter

/* ── per-item meta (group + archived) ── */
function metaAll() { try { return JSON.parse(localStorage.getItem(META_KEY) || '{}'); } catch { return {}; } }
function metaKey(item) { return item.kind + ':' + item.id; }
function metaGet(item) { return metaAll()[metaKey(item)] || { group: '', archived: false }; }
function metaSet(item, patch) {
  const all = metaAll(); const k = metaKey(item);
  all[k] = { ...(all[k] || { group:'', archived:false }), ...patch };
  localStorage.setItem(META_KEY, JSON.stringify(all));
}
function allGroups() {
  const m = metaAll(); const set = new Set();
  Object.values(m).forEach(v => { if (v.group) set.add(v.group); });
  return [...set].sort();
}

/* strip editor-only chrome and wrap in an inbox-safe email shell */
function cleanHtml(rawContent) {
  const wrap = document.createElement('div');
  wrap.innerHTML = rawContent || '';
  wrap.querySelectorAll('.em-sec-label,.em-sec-toolbar,.em-sec-drag-handle,.em-sec-resize-handle,.em-sec-add,.tb-resize,.tb-del,.ib-resize,.ib-del,.em-img-tools,.em-img-hint,.em-img-resize').forEach(el => el.remove());
  wrap.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  wrap.querySelectorAll('[draggable]').forEach(el => el.removeAttribute('draggable'));
  wrap.querySelectorAll('.em-upload-slot').forEach(s => { [...s.childNodes].forEach(n=>{if(n.nodeType===3)n.textContent='';}); s.classList.remove('em-upload-slot'); });
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Newsletter</title></head><body style="margin:0;padding:24px 0;background:#EDE6D8;font-family:Arial,Helvetica,sans-serif"><div style="max-width:600px;margin:0 auto;background:#fff">${wrap.innerHTML}</div></body></html>`;
}

/* layouts store an array of section defs, not raw HTML — rebuild a rough HTML preview */
function layoutToHtml(tpl) {
  const secs = (tpl.sections || []).map(s => {
    const bg = s.bgColor && s.bgColor !== 'transparent' ? s.bgColor : '#ffffff';
    return `<div style="background:${bg};padding:${s.padding||'28px 40px'}">${s.html||''}</div>`;
  }).join('');
  return `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body style="margin:0;background:#EDE6D8"><div style="max-width:600px;margin:0 auto;background:#fff">${secs}</div></body></html>`;
}

async function load() {
  const docs = await DocStore.getAll();
  let layouts = [];
  try { layouts = JSON.parse(localStorage.getItem(LAYOUT_KEY) || '[]'); } catch {}

  ITEMS = [
    ...docs.map(d => ({ kind:'doc', id:d.id, title:d.title||'Untitled', date:d.updatedAt||d.createdAt, html:d.content, raw:d })),
    ...layouts.map(l => ({ kind:'layout', id:l.id, title:l.name||'Layout', date:l.createdAt, html:null, layout:l })),
  ];
  renderStats(docs.length, layouts.length);
  render();
}

function renderStats(docCount, layoutCount) {
  document.getElementById('statRow').innerHTML = `
    <div class="stat"><b>${docCount + layoutCount}</b><span>Total saved</span></div>
    <div class="stat"><b>${docCount}</b><span>Newsletters</span></div>
    <div class="stat"><b>${layoutCount}</b><span>Layouts</span></div>`;
}

function setFilter(f, btn) {
  FILTER = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setGroup(g) { GROUP = g; render(); }

function renderGroupBar() {
  const bar = document.getElementById('groupBar');
  const groups = allGroups();
  const chip = (label, val, extra='') =>
    `<button onclick="setGroup('${val.replace(/'/g,"\\'")}')" style="padding:6px 14px;border-radius:999px;border:1.5px solid ${GROUP===val?'var(--ink)':'var(--line)'};background:${GROUP===val?'rgba(75,67,196,.08)':'var(--panel)'};color:${GROUP===val?'var(--ink)':'var(--muted)'};font-size:12.5px;font-weight:600;${extra}">${label}</button>`;
  bar.innerHTML =
    `<span style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-right:2px">Projects</span>` +
    chip('All', 'all') +
    groups.map(g => chip('📁 ' + esc(g), g)).join('') +
    `<button onclick="newGroup()" style="padding:6px 14px;border-radius:999px;border:1.5px dashed var(--line);background:none;color:var(--faint);font-size:12.5px;font-weight:600">＋ New project</button>`;
}

function newGroup() {
  const name = prompt('New project / group name:'); if (!name) return;
  // create it by tagging nothing yet — just switch filter; it appears once an item is added
  GROUP = name.trim();
  toast('Now assign newsletters to "' + GROUP + '" via each card\'s 📁 button');
  render();
}

function render() {
  renderGroupBar();
  const grid = document.getElementById('grid');
  const q = document.getElementById('search').value.toLowerCase();
  let items = ITEMS.filter(i => {
    const m = metaGet(i);
    if (FILTER === 'archived') { if (!m.archived) return false; }
    else { if (m.archived) return false; if (FILTER !== 'all' && i.kind !== FILTER) return false; }
    if (GROUP !== 'all' && (m.group || '') !== GROUP) return false;
    return i.title.toLowerCase().includes(q);
  });
  items.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><div class="em">📭</div><h3>Nothing saved yet</h3><p>Design a newsletter and hit <strong>Save</strong> (or <strong>★ Save layout</strong>) to see it here.</p><a href="/email-editor" class="btn btn-primary">Create your first newsletter</a></div>`;
    return;
  }

  grid.innerHTML = items.map(i => {
    const html = i.kind === 'doc' ? cleanHtml(i.html) : layoutToHtml(i.layout);
    const src = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
    const pill = i.kind === 'doc' ? '<span class="pill pill-doc">Newsletter</span>' : '<span class="pill pill-layout">Layout</span>';
    const date = i.date ? new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    const editHref = i.kind === 'doc' ? `/email-editor?doc=${encodeURIComponent(i.id)}` : `/email-editor`;
    const m = metaGet(i);
    const groupTag = m.group ? `<span class="pill" style="background:rgba(182,136,30,.14);color:#8a6a12">📁 ${esc(m.group)}</span>` : '';
    return `<div class="card">
      <div class="card-preview" onclick="location.href='${editHref}'"><iframe src="${src}" sandbox="allow-same-origin" loading="lazy"></iframe></div>
      <div class="card-body">
        <div class="card-title" title="${esc(i.title)}">${esc(i.title)}</div>
        <div class="card-meta">${pill}${groupTag}<span>${date}</span></div>
        <div class="card-actions">
          <a class="act" href="${editHref}">✏️ Edit</a>
          <button class="act" onclick="moveToGroup('${i.kind}','${i.id}')">📁 Project</button>
          <button class="act" onclick="downloadItem('${i.kind}','${i.id}')">↓ Download</button>
          <button class="act" onclick="copyItem('${i.kind}','${i.id}')">📋 Copy</button>
          <button class="act" onclick="toggleArchive('${i.kind}','${i.id}')">${m.archived ? '↩ Unarchive' : '🗄 Archive'}</button>
          <button class="act danger" onclick="askDelete('${i.kind}','${i.id}','${esc(i.title)}')">🗑 Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function moveToGroup(kind, id) {
  const item = _find(kind, id); if (!item) return;
  const existing = allGroups();
  const cur = metaGet(item).group || '';
  const hint = existing.length ? `\nExisting: ${existing.join(', ')}` : '';
  const g = prompt(`Move "${item.title}" to which project? (blank = none)${hint}`, cur);
  if (g === null) return;
  metaSet(item, { group: g.trim() });
  toast(g.trim() ? `Moved to "${g.trim()}"` : 'Removed from project');
  render();
}

function toggleArchive(kind, id) {
  const item = _find(kind, id); if (!item) return;
  const now = !metaGet(item).archived;
  metaSet(item, { archived: now });
  toast(now ? 'Archived' : 'Restored from archive');
  render();
}

function _find(kind, id) { return ITEMS.find(i => i.kind === kind && String(i.id) === String(id)); }
function _htmlFor(item) { return item.kind === 'doc' ? cleanHtml(item.html) : layoutToHtml(item.layout); }

function downloadItem(kind, id) {
  const item = _find(kind, id); if (!item) return;
  const blob = new Blob([_htmlFor(item)], { type:'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = (item.title||'newsletter').replace(/[^a-z0-9]+/gi,'-').toLowerCase() + '.html'; a.click();
  toast('Downloaded ' + item.title);
}

async function copyItem(kind, id) {
  const item = _find(kind, id); if (!item) return;
  const html = _htmlFor(item);
  try { await navigator.clipboard.writeText(html); toast('✓ HTML copied to clipboard'); }
  catch { const ta=document.createElement('textarea'); ta.value=html; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast('✓ Copied');}catch{toast('Copy blocked');} ta.remove(); }
}

let _pendingDel = null;
function askDelete(kind, id, title) {
  _pendingDel = { kind, id };
  document.getElementById('confirmName').textContent = title;
  document.getElementById('confirm').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm').classList.remove('open'); _pendingDel = null; }
document.getElementById('confirmDel').addEventListener('click', async () => {
  if (!_pendingDel) return;
  const { kind, id } = _pendingDel;
  if (kind === 'doc') { await DocStore.delete(id); }
  else { let l=[]; try{l=JSON.parse(localStorage.getItem(LAYOUT_KEY)||'[]');}catch{} localStorage.setItem(LAYOUT_KEY, JSON.stringify(l.filter(x=>String(x.id)!==String(id)))); }
  closeConfirm();
  await load();
  toast('Deleted');
});

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg){ const t=document.createElement('div'); t.style.cssText='position:fixed;bottom:24px;right:24px;background:#211C14;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:99999;box-shadow:0 6px 20px rgba(0,0,0,.3)'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }

load();
</script>
</body>
</html>
